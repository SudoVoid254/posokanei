<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PosoKanei - Price Comparison</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙 Dark</button>
  <div class="keyboard-hint" title="Click for keyboard shortcuts">Press <kbd>?</kbd> for help</div>
  <button class="compare-btn" id="compareBtn" aria-label="Compare selected products">
    Compare ⚖
    <span class="compare-count" id="compareCount">0</span>
  </button>
  <button class="compare-btn" id="favoritesBtn" aria-label="View favorites" style="bottom: 80px; background: #ff9800;">
    Favorites ★
    <span class="compare-count" id="favoritesCount">0</span>
  </button>

  <div class="modal" id="compareModal" role="dialog" aria-labelledby="compareModalTitle">
    <div class="modal-content">
      <button class="modal-close" id="compareClose" aria-label="Close compare modal">✕</button>
      <h2 id="compareModalTitle">Compare Products</h2>
      <table class="compare-table">
        <tbody id="compareTable"></tbody>
      </table>
      <button class="export-btn" onclick="exportCompareToCSV()">📥 Export to CSV</button>
    </div>
  </div>

  <div class="modal" id="favoritesModal" role="dialog" aria-labelledby="favoritesModalTitle">
    <div class="modal-content" style="max-width: 800px;">
    </div>
  </div>

  <div id="detailModal" role="dialog" aria-labelledby="detailModalTitle">
  </div>

  <div class="container">
    <h1>PosoKanei - Price Comparison</h1>

    <div class="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle categories sidebar">☰ Categories</button>
      <h3>Categories</h3>
      <ul class="category-list" id="categories"></ul>
    </div>

    <div class="main">
      <h3 id="selectedCatName">
        Select a category
        <span class="product-count"></span>
      </h3>

      <div class="controls">
        <div class="control-group">
          <label for="searchInput">Search</label>
          <input type="text" id="searchInput" placeholder="Product name..." aria-label="Search products">
        </div>
        <div class="control-group">
          <label for="pageSize">Per page</label>
          <select id="pageSize" aria-label="Products per page">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>
        <div class="control-group">
          <label for="sortOrder">Sort price</label>
          <select id="sortOrder" aria-label="Sort products by price">
            <option value="asc" selected>Low to high</option>
            <option value="desc">High to low</option>
          </select>
        </div>
      </div>

      <div class="price-range-container">
        <label>Price range (€)</label>
        <div class="price-inputs">
          <input type="number" id="priceMin" placeholder="Min" step="0.01" value="0" aria-label="Minimum price">
          <input type="number" id="priceMax" placeholder="Max" step="0.01" value="0" aria-label="Maximum price">
        </div>
        <div class="price-display">
          Category range: €<span id="priceDisplay">0.00</span> - €<span id="priceDisplayMax">0.00</span>
        </div>
      </div>

      <div class="brand-filter">
        <label for="brandFilter">Brand</label>
        <select id="brandFilter" class="brand-select" aria-label="Filter by brand">
          <option value="all">All Brands</option>
        </select>
        <button class="filter-reset" id="clearFilters" aria-label="Clear all filters">Clear All Filters</button>
        <button class="export-btn" onclick="exportFavoritesToCSV()" style="background: #6c757d; margin-top: 8px;">📥
          Export Favorites</button>
      </div>

      <div id="content">
        <p style="color: #666;">Click a category to view products</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
